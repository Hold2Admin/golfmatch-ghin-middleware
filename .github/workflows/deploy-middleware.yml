name: Deploy GHIN Middleware to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: golfmatch-ghin-middleware
  AZURE_RESOURCE_GROUP: RG_GolfMatch
  NODE_VERSION: '20.x'

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-ghin-middleware-main
  cancel-in-progress: true

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    outputs:
      deployment_version: ${{ steps.meta.outputs.deployment_version }}
      deployed_at_utc: ${{ steps.meta.outputs.deployed_at_utc }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: npm
        cache-dependency-path: package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test --if-present

    - name: Set deployment metadata
      id: meta
      shell: bash
      run: |
        set -euo pipefail
        short_sha="${GITHUB_SHA::7}"
        package_version="$(node -p 'require("./package.json").version')"
        deployed_at_utc="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        deployment_version="${package_version}+${short_sha}.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"

        echo "deployment_version=$deployment_version" >> "$GITHUB_OUTPUT"
        echo "deployed_at_utc=$deployed_at_utc" >> "$GITHUB_OUTPUT"

    - name: Create deployment package
      shell: bash
      run: |
        set -euo pipefail
        rm -f deploy.zip
        rm -rf deploy-package
        mkdir -p deploy-package

        cp -R src deploy-package/src
        cp package.json deploy-package/package.json
        cp package-lock.json deploy-package/package-lock.json
        cp README.md deploy-package/README.md

        pushd deploy-package
        npm ci --omit=dev
        zip -r ../deploy.zip . \
          -x "wwwroot/**" "logs/**" "logs_temp/**" "logs_temp2/**" "coverage/**" "dist/**" "build/**"
        popd

    - name: Upload deployment artifact
      uses: actions/upload-artifact@v4
      with:
        name: middleware-deploy-package
        path: deploy.zip
        retention-days: 7

  deploy-private:
    needs: build-test-package
    runs-on:
      - self-hosted
      - Linux
      - X64
      - middleware-vnet

    steps:
    - name: Download deployment artifact
      uses: actions/download-artifact@v4
      with:
        name: middleware-deploy-package
        path: downloaded-artifact

    - name: Login to Azure (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Deploy package via private native App Service deploy
      shell: bash
      run: |
        set -euo pipefail
        attempts=5
        delay_seconds=30

        for attempt in $(seq 1 "$attempts"); do
          set +e
          deploy_output=$(az webapp deploy \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --src-path downloaded-artifact/deploy.zip \
            --type zip \
            --clean true \
            --restart false \
            --output json 2>&1)
          exit_code=$?
          set -e

          if [ "$exit_code" -eq 0 ]; then
            echo "$deploy_output"
            exit 0
          fi

          echo "$deploy_output"
          if [ "$attempt" -lt "$attempts" ] && echo "$deploy_output" | grep -q "Another deployment is in progress"; then
            echo "Kudu reported an in-progress deployment lock on attempt $attempt/$attempts; retrying in ${delay_seconds}s"
            sleep "$delay_seconds"
            continue
          fi

          echo "Deployment failed on attempt $attempt/$attempts"
          exit "$exit_code"
        done

    - name: Retire legacy Run From Package settings
      shell: bash
      run: |
        set -euo pipefail
        az webapp config appsettings delete \
          --name ${{ env.AZURE_WEBAPP_NAME }} \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --setting-names WEBSITE_RUN_FROM_PACKAGE APP_PACKAGE_BLOB_NAME \
          --output none

    - name: Stamp deployment metadata app settings
      shell: bash
      run: |
        set -euo pipefail
        az webapp config appsettings set \
          --name ${{ env.AZURE_WEBAPP_NAME }} \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --settings \
            APP_DEPLOYMENT_VERSION='${{ needs.build-test-package.outputs.deployment_version }}' \
            APP_DEPLOYMENT_SHA='${{ github.sha }}' \
            APP_DEPLOYMENT_RUN_ID='${{ github.run_id }}' \
            APP_DEPLOYMENT_RUN_ATTEMPT='${{ github.run_attempt }}' \
            APP_DEPLOYED_AT_UTC='${{ needs.build-test-package.outputs.deployed_at_utc }}' \
          --output none

    - name: Restart app after deployment switch
      shell: bash
      run: |
        set -euo pipefail
        az webapp restart \
          --name ${{ env.AZURE_WEBAPP_NAME }} \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }}

    - name: Verify private health endpoint
      shell: bash
      run: |
        set -euo pipefail
        app_url='https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/v1/health'
        expected='${{ needs.build-test-package.outputs.deployment_version }}'

        for i in $(seq 1 30); do
          http_status=$(curl -sS -o health.json -w '%{http_code}' "$app_url" || true)
          if [ "$http_status" = "200" ] && jq -e --arg expected "$expected" '.status == "healthy" and .deployment.deploymentVersion == $expected' health.json > /dev/null; then
            echo "Private health check passed on attempt $i"
            exit 0
          fi
          echo "Attempt $i failed; status=$http_status"
          sleep 10
        done

        echo 'Private health check failed'
        cat health.json || true
        exit 1

    - name: Summarize deployment
      shell: bash
      run: |
        {
          echo '### Middleware deployment'
          echo ''
          echo '- Deploy mode: private native App Service deploy'
          echo '- Deployment version: ${{ needs.build-test-package.outputs.deployment_version }}'
          echo '- Commit SHA: ${{ github.sha }}'
          echo '- Deploy target: production'
        } >> "$GITHUB_STEP_SUMMARY"

  cleanup-artifacts:
    needs: deploy-private
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Prune old artifacts (keep 2 newest)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          KEEP: 2
        run: |
          artifacts=$(gh api repos/$REPO/actions/artifacts --paginate \
            --jq '.artifacts | sort_by(.created_at) | reverse')
          echo "$artifacts" | jq -c ".[$KEEP:]" | jq -r '.[].id' | while read -r id; do
            [ -n "$id" ] || continue
            echo "Deleting artifact $id"
            gh api -X DELETE repos/$REPO/actions/artifacts/$id > /dev/null
          done
