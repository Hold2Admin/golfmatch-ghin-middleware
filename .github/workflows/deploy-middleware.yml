name: Deploy GHIN Middleware to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_health_check:
        description: 'Run post-deploy health check (may be blocked by IP restrictions)'
        required: false
        default: false
        type: boolean

env:
  AZURE_WEBAPP_NAME: golfmatch-ghin-middleware
  AZURE_RESOURCE_GROUP: RG_GolfMatch
  NODE_VERSION: '20.x'

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-ghin-middleware-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: 'package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test --if-present

    - name: Set deployment metadata
      shell: bash
      run: |
        set -euo pipefail
        SHORT_SHA="${GITHUB_SHA::7}"
        PACKAGE_VERSION="$(node -p 'require("./package.json").version')"
        DEPLOYED_AT_UTC="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        DEPLOYMENT_VERSION="${PACKAGE_VERSION}+${SHORT_SHA}.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
        BLOB_NAME="ghin-middleware-${SHORT_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.zip"

        echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_ENV"
        echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"
        echo "DEPLOYED_AT_UTC=$DEPLOYED_AT_UTC" >> "$GITHUB_ENV"
        echo "DEPLOYMENT_VERSION=$DEPLOYMENT_VERSION" >> "$GITHUB_ENV"
        echo "BLOB_NAME=$BLOB_NAME" >> "$GITHUB_ENV"

    - name: Create deployment package with production dependencies
      shell: bash
      run: |
        set -euo pipefail
        echo "Creating deploy.zip with production dependencies for Run From Package"
        rm -f deploy.zip
        rm -rf deploy-package
        mkdir -p deploy-package

        cp -R src deploy-package/src
        cp package.json deploy-package/package.json
        cp package-lock.json deploy-package/package-lock.json
        cp README.md deploy-package/README.md
        if [ -f GETTING-STARTED.md ]; then
          cp GETTING-STARTED.md deploy-package/GETTING-STARTED.md
        fi

        pushd deploy-package
        npm ci --omit=dev
        zip -r ../deploy.zip . \
          -x "wwwroot/**" "logs/**" "logs_temp/**" "logs_temp2/**" "coverage/**" "dist/**" "build/**"
        popd

    - name: Verify deployment package contents
      shell: bash
      run: |
        set -euo pipefail
        echo "Inspecting deploy.zip contents"
        unzip -l deploy.zip | grep "node_modules/express/package.json"
        unzip -l deploy.zip | grep "src/index.js"
        du -h deploy.zip

    - name: Login to Azure (OIDC)
      uses: azure/login@v1
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Upload package to blob storage
      shell: bash
      run: |
        set -euo pipefail
        az storage blob upload \
          --account-name golfmatchstorage \
          --container-name deployments \
          --name "$BLOB_NAME" \
          --file deploy.zip \
          --auth-mode login \
          --overwrite

    - name: Deploy via Run From Package
      shell: bash
      run: |
        set -euo pipefail
        BLOB_URL="https://golfmatchstorage.blob.core.windows.net/deployments/${BLOB_NAME}"
        az webapp config appsettings set \
          --name ${{ env.AZURE_WEBAPP_NAME }} \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --settings \
            WEBSITE_RUN_FROM_PACKAGE="$BLOB_URL" \
            APP_DEPLOYMENT_VERSION="$DEPLOYMENT_VERSION" \
            APP_DEPLOYMENT_SHA="$GITHUB_SHA" \
            APP_DEPLOYMENT_RUN_ID="$GITHUB_RUN_ID" \
            APP_DEPLOYMENT_RUN_ATTEMPT="$GITHUB_RUN_ATTEMPT" \
            APP_DEPLOYED_AT_UTC="$DEPLOYED_AT_UTC" \
            APP_PACKAGE_BLOB_NAME="$BLOB_NAME" \
          --output none

    - name: Restart app after package update
      shell: bash
      run: |
        set -euo pipefail
        az webapp restart \
          --name ${{ env.AZURE_WEBAPP_NAME }} \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }}

    - name: Summarize deployment metadata
      shell: bash
      run: |
        {
          echo "### Middleware deployment"
          echo ""
          echo "- Deployment version: $DEPLOYMENT_VERSION"
          echo "- Commit SHA: $GITHUB_SHA"
          echo "- Package blob: $BLOB_NAME"
          echo "- Deployed at (UTC): $DEPLOYED_AT_UTC"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Test deployment (retry until healthy)
      if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_health_check == true }}
      shell: bash
      run: |
        set -euo pipefail
        APP_URL="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/v1/health"
        echo "Checking health at $APP_URL"
        attempts=30
        delay=10
        for i in $(seq 1 $attempts); do
          http_status=$(curl -sS -o health.json -w '%{http_code}' "$APP_URL" || true)
          if [ "$http_status" = "200" ] && jq -e --arg expected "$DEPLOYMENT_VERSION" '.status == "healthy" and .deployment.deploymentVersion == $expected' health.json > /dev/null; then
            echo "Health check passed on attempt $i"
            exit 0
          fi
          echo "Attempt $i failed; status=$http_status; waiting $delay seconds..."
          sleep $delay
        done
        echo "Health check did not pass after $attempts attempts"
        echo "Last response:" && cat health.json || true
        exit 1

  cleanup-artifacts:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Prune old artifacts (keep 2 newest)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          KEEP: 2
        run: |
          artifacts=$(gh api repos/$REPO/actions/artifacts --paginate \
            --jq '.artifacts | sort_by(.created_at) | reverse')
          echo "$artifacts" | jq -c ".[$KEEP:]" | jq -r '.[].id' | while read -r id; do
            [ -n "$id" ] || continue
            echo "Deleting artifact $id"
            gh api -X DELETE repos/$REPO/actions/artifacts/$id > /dev/null
          done
