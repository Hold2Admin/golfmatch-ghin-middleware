name: Deploy GHIN Middleware to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: golfmatch-ghin-middleware
  AZURE_RESOURCE_GROUP: RG_GolfMatch
  NODE_VERSION: '20.x'

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-ghin-middleware-main
  cancel-in-progress: true

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    outputs:
      deployment_version: ${{ steps.meta.outputs.deployment_version }}
      deployed_at_utc: ${{ steps.meta.outputs.deployed_at_utc }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: npm
        cache-dependency-path: package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test --if-present

    - name: Set deployment metadata
      id: meta
      shell: bash
      run: |
        set -euo pipefail
        short_sha="${GITHUB_SHA::7}"
        package_version="$(node -p 'require("./package.json").version')"
        deployed_at_utc="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        deployment_version="${package_version}+${short_sha}.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"

        echo "deployment_version=$deployment_version" >> "$GITHUB_OUTPUT"
        echo "deployed_at_utc=$deployed_at_utc" >> "$GITHUB_OUTPUT"

    - name: Create deployment package
      shell: bash
      run: |
        set -euo pipefail
        rm -f deploy.zip
        rm -rf deploy-package
        mkdir -p deploy-package

        cp -R src deploy-package/src
        cp package.json deploy-package/package.json
        cp package-lock.json deploy-package/package-lock.json
        cp README.md deploy-package/README.md
        cat > deploy-package/deployment-info.json <<EOF
        {
          "deploymentVersion": "${{ steps.meta.outputs.deployment_version }}",
          "commitSha": "${{ github.sha }}",
          "runId": "${{ github.run_id }}",
          "runAttempt": "${{ github.run_attempt }}",
          "deployedAtUtc": "${{ steps.meta.outputs.deployed_at_utc }}",
          "packageBlobName": null
        }
        EOF

        pushd deploy-package
        npm ci --omit=dev
        zip -r ../deploy.zip . \
          -x "wwwroot/**" "logs/**" "logs_temp/**" "logs_temp2/**" "coverage/**" "dist/**" "build/**"
        popd

    - name: Upload deployment artifact
      uses: actions/upload-artifact@v4
      with:
        name: middleware-deploy-package
        path: deploy.zip
        retention-days: 7

  deploy-private:
    needs: build-test-package
    runs-on:
      - self-hosted
      - Linux
      - X64
      - middleware-vnet

    steps:
    - name: Download deployment artifact
      uses: actions/download-artifact@v4
      with:
        name: middleware-deploy-package
        path: downloaded-artifact

    - name: Login to Azure (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Validate App Service deploy mode
      shell: bash
      run: |
        set -euo pipefail
        app_settings=$(az webapp config appsettings list \
          --name ${{ env.AZURE_WEBAPP_NAME }} \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --output json)

        remote_build=$(echo "$app_settings" | jq -r '.[] | select(.name=="SCM_DO_BUILD_DURING_DEPLOYMENT") | .value' | tail -n 1)
        run_from_package=$(echo "$app_settings" | jq -r '.[] | select(.name=="WEBSITE_RUN_FROM_PACKAGE") | .value' | tail -n 1)

        if [ "$remote_build" = "true" ]; then
          echo "SCM_DO_BUILD_DURING_DEPLOYMENT must be false for prebuilt zipdeploy artifacts"
          exit 1
        fi

        case "$run_from_package" in
          1|true)
            echo "WEBSITE_RUN_FROM_PACKAGE must be unset for this Kudu zipdeploy workflow"
            exit 1
            ;;
        esac

    - name: Resolve private Kudu publish credentials
      shell: bash
      run: |
        set -euo pipefail
        profile_json=$(az webapp deployment list-publishing-profiles \
          --name ${{ env.AZURE_WEBAPP_NAME }} \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --query "[?publishMethod=='ZipDeploy'] | [0].{user:userName,pwd:userPWD,publishUrl:publishUrl}" \
          --output json)

        kudu_user=$(echo "$profile_json" | jq -r '.user')
        kudu_pwd=$(echo "$profile_json" | jq -r '.pwd')
        publish_url=$(echo "$profile_json" | jq -r '.publishUrl' | sed 's/:443$//')

        if [ -z "$kudu_user" ] || [ "$kudu_user" = "null" ] || [ -z "$kudu_pwd" ] || [ "$kudu_pwd" = "null" ] || [ -z "$publish_url" ] || [ "$publish_url" = "null" ]; then
          echo "Failed to resolve Kudu publishing credentials"
          exit 1
        fi

        echo "::add-mask::$kudu_user"
        echo "::add-mask::$kudu_pwd"
        echo "KUDU_USER=$kudu_user" >> "$GITHUB_ENV"
        echo "KUDU_PWD=$kudu_pwd" >> "$GITHUB_ENV"
        echo "KUDU_BASE_URL=https://$publish_url" >> "$GITHUB_ENV"

    - name: Deploy package via private Kudu zipdeploy
      shell: bash
      run: |
        set -euo pipefail
        auth="$KUDU_USER:$KUDU_PWD"
        deploy_url="$KUDU_BASE_URL/api/zipdeploy?isAsync=true&deployer=GITHUB_ZIP_DEPLOY"
        headers_file=$(mktemp)
        body_file=$(mktemp)

        http_status=$(curl -sS \
          -u "$auth" \
          -X POST \
          -H 'Content-Type: application/zip' \
          --data-binary @downloaded-artifact/deploy.zip \
          -D "$headers_file" \
          -o "$body_file" \
          -w '%{http_code}' \
          "$deploy_url")

        if [ "$http_status" != "200" ] && [ "$http_status" != "202" ]; then
          echo "ZipDeploy request failed with status $http_status"
          cat "$body_file" || true
          exit 1
        fi

        poll_url=$(awk 'tolower($1)=="location:" {print $2}' "$headers_file" | tr -d '\r')
        if [ -z "$poll_url" ]; then
          poll_url="$KUDU_BASE_URL/api/deployments/latest"
        fi

        for attempt in $(seq 1 60); do
          response=$(curl -sS -u "$auth" "$poll_url")
          status=$(echo "$response" | jq -r '.status // empty')
          complete=$(echo "$response" | jq -r '.complete // empty')
          active=$(echo "$response" | jq -r '.active // empty')
          progress=$(echo "$response" | jq -r '.progress // empty')

          echo "ZipDeploy status attempt $attempt: status=${status:-unknown} complete=${complete:-unknown} active=${active:-unknown} progress=${progress:-unknown}"

          if [ "$complete" = "true" ] && [ "$status" = "4" ]; then
            exit 0
          fi

          if [ "$complete" = "true" ] && [ "$status" != "4" ]; then
            echo "$response"
            echo "ZipDeploy completed with non-success status"
            exit 1
          fi

          sleep 10
        done

        echo "Timed out waiting for ZipDeploy completion"
        curl -sS -u "$auth" "$KUDU_BASE_URL/api/deployments/latest/log" || true
        exit 1

    - name: Summarize deployment
      shell: bash
      run: |
        {
          echo '### Middleware deployment'
          echo ''
          echo '- Deploy mode: private native App Service deploy'
          echo '- Deployment version: ${{ needs.build-test-package.outputs.deployment_version }}'
          echo '- Commit SHA: ${{ github.sha }}'
          echo '- Deploy target: production'
        } >> "$GITHUB_STEP_SUMMARY"

  cleanup-artifacts:
    needs: deploy-private
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Prune old artifacts (keep 2 newest)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          KEEP: 2
        run: |
          artifacts=$(gh api repos/$REPO/actions/artifacts --paginate \
            --jq '.artifacts | sort_by(.created_at) | reverse')
          echo "$artifacts" | jq -c ".[$KEEP:]" | jq -r '.[].id' | while read -r id; do
            [ -n "$id" ] || continue
            echo "Deleting artifact $id"
            gh api -X DELETE repos/$REPO/actions/artifacts/$id > /dev/null
          done
